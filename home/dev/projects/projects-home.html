<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Projects · 김건우</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0e;--bg2:#111115;--bg3:#18181e;--border:#242430;--bord2:#2e2e3a;--text:#f0eee8;--muted:#7a7888;--muted2:#4a4858;--red:#e8391a;--red2:#ff5533;--purple:#8b5cf6;--blue:#4a7fd4;--green:#3da86a;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:500;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.5;}
nav{position:fixed;top:0;left:0;right:0;z-index:300;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(12,12,14,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--text);text-decoration:none;}.nav-logo em{color:var(--red);font-style:normal;}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-back{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}.nav-back:hover{color:var(--red);}
.nav-profile{width:32px;height:32px;border-radius:50%;background:var(--bord2);border:1.5px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--muted);}
.nav-profile img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.page-header{padding:100px 48px 56px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.page-header::after{content:'';position:absolute;pointer-events:none;top:-200px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(139,92,246,0.06) 0%,transparent 65%);}
.page-header::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:80px 80px;}
.ph-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1;}
.breadcrumb{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:16px;}
.breadcrumb a{color:var(--muted2);text-decoration:none;transition:color .2s;}.breadcrumb a:hover{color:var(--red);}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,100px);letter-spacing:-2px;color:var(--text);line-height:.95;margin-bottom:16px;}.page-title em{color:var(--purple);font-style:normal;}
.page-sub{font-size:14px;color:var(--muted);font-weight:300;line-height:1.8;max-width:560px;}
.page-bg-text{position:absolute;right:-10px;bottom:-20px;font-family:'Bebas Neue',sans-serif;font-size:clamp(80px,14vw,200px);color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.03);line-height:1;pointer-events:none;user-select:none;letter-spacing:-4px;z-index:0;}
.content{max-width:1100px;margin:0 auto;padding:80px 48px;}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}.reveal.on{opacity:1;transform:translateY(0);}
/* PROJECT CARDS */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.proj-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:border-color .2s,transform .15s;}
.proj-card:hover{border-color:var(--purple);transform:translateY(-3px);}
.proj-card-top{height:100px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.proj-card-top::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;}
.pt-loil{background:rgba(139,92,246,0.06);color:var(--purple);}
.pt-wip{background:rgba(74,127,212,0.06);color:var(--blue);}
.proj-card-body{padding:20px 22px;flex:1;display:flex;flex-direction:column;gap:10px;}
.proj-card-body h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--text);}
.proj-card-body p{font-size:12px;color:var(--muted);font-weight:300;line-height:1.7;flex:1;}
.proj-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:4px;}
.proj-badge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:2px;letter-spacing:1px;text-transform:uppercase;}
.b-active{background:rgba(232,57,26,.1);color:var(--red);border:1px solid rgba(232,57,26,.3);}
.b-wip{background:rgba(74,127,212,.1);color:var(--blue);border:1px solid rgba(74,127,212,.3);}
.proj-stack{display:flex;gap:5px;flex-wrap:wrap;}
.stag{font-family:'DM Mono',monospace;font-size:9px;padding:3px 7px;border-radius:2px;border:1px solid var(--border);color:var(--muted2);}
/* WIP placeholder card */
.proj-card-placeholder{background:var(--bg2);border:1px dashed var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 20px;text-align:center;min-height:180px;}
.proj-card-placeholder .ph-icon{font-size:32px;opacity:.2;}
.proj-card-placeholder p{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;}
footer{padding:24px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-top:1px solid var(--border);}
footer p{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;}
.foot-links{display:flex;gap:20px;}.foot-links a{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);text-decoration:none;letter-spacing:1px;text-transform:uppercase;transition:color .2s;}.foot-links a:hover{color:var(--red);}
@media(max-width:768px){nav{padding:0 20px;}.page-header{padding:80px 20px 40px;}.content{padding:48px 20px;}footer{padding:20px;}.proj-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a href="../../../index.html" class="nav-logo">WG<em>.</em></a>
  <div class="nav-right">
    <a href="../dev-home.html" class="nav-back">← Dev Log</a>
    <div class="nav-profile"><img src="../../../../image/김건우4.jpg" alt="WG" onerror="this.style.display='none';this.parentNode.textContent='WG'"></div>
  </div>
</nav>

<div class="page-header">
  <div class="page-bg-text">DEV</div>
  <div class="ph-inner">
    <div class="breadcrumb"><a href="../../../index.html">Home</a> / <a href="../dev-home.html">Dev Log</a> / Dev Projects</div>
    <h1 class="page-title">DEV<br><em>PROJECTS</em></h1>
    <p class="page-sub">개인 및 사이드 프로젝트 개발 일지. 마일스톤별 진행 상황과 작업 체크리스트를 기록합니다.</p>
  </div>
</div>

<div class="content">
  <div class="proj-grid">

    <a href="loil.html" class="proj-card reveal">
      <div class="proj-card-top pt-loil">LoIl</div>
      <div class="proj-card-body">
        <h3>LoIl · 로일</h3>
        <p>로스트아크 길드 레이드 자동화 디스코드 봇. Google Sheets 연동, Gemini AI 파티 추천, 이미지 렌더링까지.</p>
        <div class="proj-meta">
          <span class="proj-badge b-active">M2 진행중</span>
          <div class="proj-stack">
            <span class="stag">Python</span>
            <span class="stag">Discord.py</span>
            <span class="stag">Gemini AI</span>
          </div>
        </div>
      </div>
    </a>

    <div class="proj-card-placeholder reveal">
      <div class="ph-icon">➕</div>
      <p>다음 프로젝트 일지<br>추가 예정</p>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 KIM GUNWOO · WG</p>
  <div class="foot-links">
    <a href="../../../index.html">Home</a>
    <a href="../dev-home.html">Dev Log</a>
  </div>
</footer>
<script>
const obs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('on');}),{threshold:.08});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
