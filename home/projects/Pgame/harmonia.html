<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonia · 김건우</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0e;--bg3:#18181e;--border:#242430;--bord2:#2e2e3a;--text:#f0eee8;--muted:#7a7888;--muted2:#4a4858;--red:#e8391a;--red2:#ff5533;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:grid;grid-template-rows:56px 1fr auto;}
body::before{content:'';position:fixed;inset:0;z-index:500;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.5;}
nav{position:fixed;top:0;left:0;right:0;z-index:300;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(12,12,14,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--text);text-decoration:none;}.nav-logo em{color:var(--red);font-style:normal;}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-back{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}.nav-back:hover{color:var(--red);}
.nav-profile{width:32px;height:32px;border-radius:50%;background:var(--bord2);border:1.5px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--muted);}
.nav-profile img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
main{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;position:relative;overflow:hidden;}
main::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:80px 80px;}
main::after{content:'';position:absolute;pointer-events:none;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(232,57,26,0.05) 0%,transparent 65%);}
.icon{font-size:64px;margin-bottom:24px;position:relative;z-index:1;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,8vw,80px);letter-spacing:-1px;color:var(--text);margin-bottom:8px;position:relative;z-index:1;}
.type{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:16px;position:relative;z-index:1;}
p{font-size:14px;color:var(--muted);font-weight:300;max-width:400px;line-height:1.8;position:relative;z-index:1;}
.wip{display:inline-flex;align-items:center;gap:8px;margin-top:24px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);background:var(--bg3);border:1px solid var(--border);padding:8px 16px;border-radius:2px;position:relative;z-index:1;}
footer{padding:20px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-top:1px solid var(--border);}
footer p{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;}
.foot-links{display:flex;gap:20px;}.foot-links a{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);text-decoration:none;letter-spacing:1px;text-transform:uppercase;transition:color .2s;}.foot-links a:hover{color:var(--red);}
@media(max-width:768px){nav{padding:0 20px;}footer{padding:16px 20px;}}
</style>
</head>
<body>
<nav>
  <a href="../../index.html" class="nav-logo">WG<em>.</em></a>
  <div class="nav-right">
    <a href="../Pgame-home.html" class="nav-back">← Back</a>
    <div class="nav-profile"><img src="" alt="WG" onerror="this.style.display='none';this.parentNode.textContent='WG'"></div>
  </div>
</nav>
<main>
  <div class="icon">🎮</div>
  <h1>Harmonia</h1>
  <div class="type">Game · UE5 · 7인팀</div>
  <p>페이지를 준비 중입니다. 곧 프로젝트 상세 내용, 개발 과정, 기술 스택이 채워질 예정이에요.</p>
  <div class="wip">🚧 Work in Progress</div>
</main>
<footer>
  <p>© 2026 KIM GUNWOO · WG</p>
  <div class="foot-links"><a href="../../index.html">Home</a><a href="../Pgame-home.html">Back</a></div>
</footer>
</body>
</html>
